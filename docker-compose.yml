version: "2.4"

services:
  chromium-flasher:
    build:
      context: ./chromium-flasher
    privileged: true
    shm_size: "1gb"
    labels:
      io.balena.features.sysfs: "1"
      io.balena.features.procfs: "1"
      io.balena.features.kernel-modules: "1"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Vilnius
      - PASSWORD=changeme
      - DISPLAY_WIDTH=1024
      - DISPLAY_HEIGHT=768
      - DISPLAY_DEPTH=16
      - START_URL=https://flasher.meshcore.co.uk/
      - CHROME_CLI=--no-sandbox --no-zygote --single-process --renderer-process-limit=1 --process-per-site --disable-site-isolation-trials --disable-dev-shm-usage --enable-features=WebSerial,WebUSB --disable-gpu --disable-software-rasterizer --disable-background-networking --disable-sync --disable-extensions --disable-component-update --disable-default-apps --disable-popup-blocking --disable-translate --disable-notifications --disable-background-timer-throttling --disable-renderer-backgrounding --disable-backgrounding-occluded-windows --disable-features=Translate,BackForwardCache,MediaRouter,OptimizationHints,AutofillServerCommunication,InterestFeedContentSuggestions --no-first-run --start-maximized --window-size=1024,768 --ozone-platform=x11 https://flasher.meshcore.co.uk/
    ports:
      - "3001:3001"
    volumes:
      - chromium-config:/config
    restart: unless-stopped

  serial-tools:
    build:
      context: ./serial-tools
    privileged: true
    labels:
      io.balena.features.sysfs: "1"
      io.balena.features.procfs: "1"
      io.balena.features.kernel-modules: "1"
    ports:
      - "7681:7681"
    volumes:
      - serial-data:/data
    command: ttyd -W -p 7681 bash
    restart: unless-stopped

volumes:
  chromium-config:
  serial-data:
